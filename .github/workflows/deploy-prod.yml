name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Required Docker image version, for example v2.0.1"
        required: true
        type: string
      latest:
        description: "Also tag this image as latest"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Validate inputs
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_ref: ${{ steps.image.outputs.image_ref }}
      version: ${{ steps.image.outputs.version }}
    steps:
      - name: Validate version and prepare image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          if [[ -z "${VERSION//[[:space:]]/}" ]]; then
            echo "::error::The version input is required."
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid Docker tag: $VERSION"
            echo "::error::Use letters, numbers, underscore, dot or dash, and keep it under 128 characters."
            exit 1
          fi

          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE:$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ needs.prepare.outputs.image }}
      image_ref: ${{ needs.prepare.outputs.image_ref }}
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ inputs.latest }}

      - name: Create manifest list and push
        shell: bash
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          IMAGE="${{ needs.prepare.outputs.image }}"
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          SOURCES=$(printf "$IMAGE@sha256:%s " *)
          eval "docker buildx imagetools create $TAGS $SOURCES"

  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs: merge
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REF: ${{ needs.merge.outputs.image_ref }}
      SSH_HOST: ${{ secrets.SERVER_HOST }}
      SSH_USER: ${{ secrets.SERVER_USERNAME }}
      SSH_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SSH_PORT: ${{ vars.SERVER_SSH_PORT || '22' }}
      COMPOSE_FILE_PATH: ${{ vars.COMPOSE_FILE_PATH }}
      COMPOSE_SERVICE: ${{ vars.COMPOSE_SERVICE || 'app' }}
      GHCR_USERNAME: duegin
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Validate deployment config
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in SSH_HOST SSH_USER SSH_PASSWORD COMPOSE_FILE_PATH; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required. Configure it in the production environment."
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Install password SSH client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy on remote server
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          SSH_OPTIONS=(-o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o StrictHostKeyChecking=accept-new)

          cat > deploy-remote.sh <<'REMOTE_SCRIPT'
          set -euo pipefail

          : "${COMPOSE_FILE_PATH:?COMPOSE_FILE_PATH is required}"
          : "${IMAGE_REF:?IMAGE_REF is required}"

          COMPOSE_SERVICE="${COMPOSE_SERVICE:-app}"

          if [[ ! -f "$COMPOSE_FILE_PATH" ]]; then
            echo "Compose file not found: $COMPOSE_FILE_PATH" >&2
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed or not in PATH." >&2
            exit 1
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE=(docker-compose)
          else
            echo "docker compose is not installed." >&2
            exit 1
          fi

          COMPOSE_DIR="$(cd "$(dirname "$COMPOSE_FILE_PATH")" && pwd)"
          COMPOSE_FILE="$COMPOSE_DIR/$(basename "$COMPOSE_FILE_PATH")"
          ENV_FILE="$COMPOSE_DIR/.env"

          cd "$COMPOSE_DIR"
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE" || true

          TMP_ENV="$(mktemp)"
          awk -v image="$IMAGE_REF" '
            BEGIN { replaced = 0 }
            /^APP_IMAGE=/ {
              print "APP_IMAGE=" image
              replaced = 1
              next
            }
            { print }
            END {
              if (!replaced) {
                print "APP_IMAGE=" image
              }
            }
          ' "$ENV_FILE" > "$TMP_ENV"
          cat "$TMP_ENV" > "$ENV_FILE"
          rm -f "$TMP_ENV"

          if [[ -n "${GHCR_TOKEN:-}" ]]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-github-actions}" --password-stdin
          fi

          "${COMPOSE[@]}" -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
          "${COMPOSE[@]}" -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
          "${COMPOSE[@]}" -f "$COMPOSE_FILE" ps
          docker image prune -f
          REMOTE_SCRIPT

          remote_command=$(
            printf 'COMPOSE_FILE_PATH=%q IMAGE_REF=%q COMPOSE_SERVICE=%q GHCR_USERNAME=%q GHCR_TOKEN=%q bash -s' \
              "$COMPOSE_FILE_PATH" \
              "$IMAGE_REF" \
              "$COMPOSE_SERVICE" \
              "$GHCR_USERNAME" \
              "$GHCR_TOKEN"
          )

          SSHPASS="$SSH_PASSWORD" sshpass -e ssh \
            -p "$SSH_PORT" \
            "${SSH_OPTIONS[@]}" \
            "$SSH_USER@$SSH_HOST" \
            "$remote_command" < deploy-remote.sh
