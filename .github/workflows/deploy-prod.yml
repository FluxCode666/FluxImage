name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Required Docker image version, for example v2.0.1"
        required: true
        type: string
      latest:
        description: "Also tag this image as latest"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_ref: ${{ steps.image.outputs.image_ref }}
      version: ${{ steps.image.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version and prepare image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          if [[ -z "${VERSION//[[:space:]]/}" ]]; then
            echo "::error::The version input is required."
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid Docker tag: $VERSION"
            echo "::error::Use letters, numbers, underscore, dot or dash, and keep it under 128 characters."
            exit 1
          fi

          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE:$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ steps.image.outputs.version }}
            type=raw,value=latest,enable=${{ inputs.latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
      SSH_HOST: ${{ secrets.SERVER_HOST }}
      SSH_USER: ${{ secrets.SERVER_USERNAME }}
      SSH_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SSH_PORT: ${{ vars.SERVER_SSH_PORT || '22' }}
      COMPOSE_FILE_PATH: ${{ vars.COMPOSE_FILE_PATH }}
      COMPOSE_SERVICE: ${{ vars.COMPOSE_SERVICE || 'app' }}
      GHCR_USERNAME: duegin
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Validate deployment config
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in SSH_HOST SSH_USER SSH_PASSWORD COMPOSE_FILE_PATH; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required. Configure it in the production environment."
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Install password SSH client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy on remote server
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          SSH_OPTIONS=(-o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o StrictHostKeyChecking=accept-new)

          cat > deploy-remote.sh <<'REMOTE_SCRIPT'
          set -euo pipefail

          : "${COMPOSE_FILE_PATH:?COMPOSE_FILE_PATH is required}"
          : "${IMAGE_REF:?IMAGE_REF is required}"

          COMPOSE_SERVICE="${COMPOSE_SERVICE:-app}"

          if [[ ! -f "$COMPOSE_FILE_PATH" ]]; then
            echo "Compose file not found: $COMPOSE_FILE_PATH" >&2
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed or not in PATH." >&2
            exit 1
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE=(docker-compose)
          else
            echo "docker compose is not installed." >&2
            exit 1
          fi

          COMPOSE_DIR="$(cd "$(dirname "$COMPOSE_FILE_PATH")" && pwd)"
          COMPOSE_FILE="$COMPOSE_DIR/$(basename "$COMPOSE_FILE_PATH")"
          ENV_FILE="$COMPOSE_DIR/.env"

          cd "$COMPOSE_DIR"
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE" || true

          TMP_ENV="$(mktemp)"
          awk -v image="$IMAGE_REF" '
            BEGIN { replaced = 0 }
            /^APP_IMAGE=/ {
              print "APP_IMAGE=" image
              replaced = 1
              next
            }
            { print }
            END {
              if (!replaced) {
                print "APP_IMAGE=" image
              }
            }
          ' "$ENV_FILE" > "$TMP_ENV"
          cat "$TMP_ENV" > "$ENV_FILE"
          rm -f "$TMP_ENV"

          if [[ -n "${GHCR_TOKEN:-}" ]]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-github-actions}" --password-stdin
          fi

          "${COMPOSE[@]}" -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
          "${COMPOSE[@]}" -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
          "${COMPOSE[@]}" -f "$COMPOSE_FILE" ps
          docker image prune -f
          REMOTE_SCRIPT

          remote_command=$(
            printf 'COMPOSE_FILE_PATH=%q IMAGE_REF=%q COMPOSE_SERVICE=%q GHCR_USERNAME=%q GHCR_TOKEN=%q bash -s' \
              "$COMPOSE_FILE_PATH" \
              "$IMAGE_REF" \
              "$COMPOSE_SERVICE" \
              "$GHCR_USERNAME" \
              "$GHCR_TOKEN"
          )

          SSHPASS="$SSH_PASSWORD" sshpass -e ssh \
            -p "$SSH_PORT" \
            "${SSH_OPTIONS[@]}" \
            "$SSH_USER@$SSH_HOST" \
            "$remote_command" < deploy-remote.sh
